<style>
:root{--bg:#f8f7f4;--bg-card:#fff;--bg-input:#f2f1ee;--border:#e5e4e0;--border-hover:#ccc;--accent:#1a6b3c;--accent2:#2d9e5f;--accent-light:#e8f5ee;--text-primary:#1a1a1a;--text-secondary:#666;--text-muted:#999;--font-title:'Clash Display',sans-serif;--font-body:'DM Sans',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text-primary);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh;}
nav{position:sticky;top:0;z-index:100;background:rgba(248,247,244,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-family:var(--font-title);font-weight:700;font-size:18px;color:var(--text-primary);text-decoration:none;}.nav-logo .fi{color:var(--accent);}
.nav-back{font-size:13px;color:var(--text-muted);text-decoration:none;}
.hero{padding:48px 24px 32px;max-width:800px;margin:0 auto;text-align:center;}
.hero-badge{display:inline-block;background:var(--accent-light);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 14px;border-radius:100px;margin-bottom:16px;font-family:var(--font-title);}
.hero h1{font-family:var(--font-title);font-size:clamp(28px,5vw,48px);font-weight:700;line-height:1.05;letter-spacing:-1.5px;margin-bottom:12px;}.hero h1 .green{color:var(--accent);}
.hero p{font-size:16px;color:var(--text-secondary);max-width:480px;margin:0 auto;}
.main{max-width:960px;margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:28px;}
.card-title{font-family:var(--font-title);font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:20px;}
.field{margin-bottom:16px;}
label{display:block;font-family:var(--font-title);font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:6px;}
.input-wrap{position:relative;}
.input-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-muted);}
input[type="number"]{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-family:var(--font-body);font-size:15px;padding:11px 14px;outline:none;appearance:none;-moz-appearance:textfield;}
input[type="range"]{width:100%;accent-color:var(--accent);margin:8px 0;}
input.has-prefix{padding-left:28px;}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,107,60,0.08);}
.range-val{font-family:var(--font-title);font-size:14px;font-weight:700;color:var(--accent);float:right;}
.btn-calc{width:100%;margin-top:12px;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:var(--font-title);font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;}.btn-calc:hover{background:var(--accent2);transform:translateY(-1px);}
.results-panel{display:flex;flex-direction:column;gap:12px;}
.result-empty{background:var(--bg-card);border:1px dashed var(--border);border-radius:20px;padding:60px 28px;text-align:center;color:var(--text-muted);font-size:14px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.result-hero{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);border-radius:18px;padding:24px;color:#fff;text-align:center;}
.rh-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;opacity:0.8;margin-bottom:8px;font-family:var(--font-title);}
.rh-value{font-family:var(--font-title);font-size:38px;font-weight:700;letter-spacing:-1.5px;margin-bottom:4px;}
.rh-sub{font-size:13px;opacity:0.75;}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.metric-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
.metric-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;font-family:var(--font-title);margin-bottom:5px;}
.metric-value{font-family:var(--font-title);font-size:20px;font-weight:700;color:var(--accent);}
.metric-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.progress-bar{background:var(--bg-input);border-radius:8px;height:12px;overflow:hidden;margin:8px 0;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:8px;transition:width 0.5s;}
.milestone-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px;}
.ms-title{font-family:var(--font-title);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:10px;}
.ms-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}.ms-row:last-child{border:none;}
.aff-banner{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.aff-text{font-size:13px;color:var(--text-secondary);}
.aff-cta{background:var(--accent);color:#fff;font-size:12px;font-weight:700;padding:7px 16px;border-radius:100px;text-decoration:none;white-space:nowrap;font-family:var(--font-title);}
.disclaimer{font-size:11px;color:var(--text-muted);text-align:center;padding:0 24px 32px;max-width:900px;margin:0 auto;}
footer{border-top:1px solid var(--border);padding:24px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;max-width:960px;margin:0 auto;}
.footer-logo{font-family:var(--font-title);font-weight:700;font-size:15px;}.footer-logo .fi{color:var(--accent);}
.footer-copy{font-size:12px;color:var(--text-muted);}
@media(max-width:700px){.main{grid-template-columns:1fr;}}

<body>
<nav><a href="index.html" class="nav-logo">My<span class="fi">Fin</span>Calc</a><a href="index.html" class="nav-back">← All calculators</a></nav>
<header class="hero">
  <div class="hero-badge">🏆 Calculator</div>
  <h1><span class="green">Savings goal calculator</span></h1>
  <p>How long until you reach your savings target?</p>
</header>
<main class="main">
  <div class="card">
    <p class="card-title">Your savings plan</p>
    <div class="field"><label>Savings goal</label><div class="input-wrap"><span class="input-prefix">$</span><input type="number" id="goal" class="has-prefix" value="25000" min="0" step="1000"></div></div>
    <div class="field"><label>Current savings</label><div class="input-wrap"><span class="input-prefix">$</span><input type="number" id="current" class="has-prefix" value="3000" min="0" step="100"></div></div>
    <div class="field"><label>Monthly savings</label><div class="input-wrap"><span class="input-prefix">$</span><input type="number" id="monthly" class="has-prefix" value="800" min="0" step="50"></div></div>
    <div class="field"><label>Annual interest / return <span class="range-val" id="rateVal">4.5%</span></label><input type="range" id="rate" min="0" max="12" value="4.5" step="0.5" oninput="document.getElementById('rateVal').textContent=this.value+'%'"></div>
    <button class="btn-calc" onclick="calculate()">Calculate timeline</button>
  </div>
  <div class="results-panel" id="resultsPanel">
    <div class="result-empty" id="emptyState"><div style="font-size:40px;opacity:0.3;">🏆</div><span>Enter your savings plan and click Calculate.</span></div>
  </div>
</main>
<div class="disclaimer">⚠️ For educational purposes only. Not financial advice.</div>
<footer><div class="footer-logo">My<span class="fi">Fin</span>Calc</div><p class="footer-copy">© 2026 MyFinCalc.org</p></footer>
<script>
function fmt(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(n);}

function calculate(){
  const goal=parseFloat(document.getElementById('goal').value)||0;
  const current=parseFloat(document.getElementById('current').value)||0;
  const monthly=parseFloat(document.getElementById('monthly').value)||0;
  const rate=parseFloat(document.getElementById('rate').value)/100/12;
  if(!goal||!monthly) return;

  let balance=current,months=0;
  const milestones=[25,50,75,100];
  const msData=[];
  while(balance<goal&&months<600){
    months++;
    balance=balance*(1+rate)+monthly;
    milestones.forEach((pct,i)=>{
      if(!msData[i]&&balance>=goal*pct/100) msData[i]={pct,months};
    });
  }

  const totalSaved=current+monthly*months;
  const interestEarned=balance-totalSaved;
  const progress=Math.min(100,(current/goal)*100);
  const years=Math.floor(months/12);
  const remainingMonths=months%12;
  const targetDate=new Date();targetDate.setMonth(targetDate.getMonth()+months);
  const dateStr=targetDate.toLocaleDateString('en-US',{month:'long',year:'numeric'});

  const panel=document.getElementById('resultsPanel');
  panel.innerHTML='';

  const hero=document.createElement('div');hero.className='result-hero';
  hero.innerHTML=`<div class="rh-label">You'll reach your goal in</div><div class="rh-value">${years>0?years+'y ':''}${remainingMonths}mo</div><div class="rh-sub">${fmt(goal)} by ${dateStr}</div>`;
  panel.appendChild(hero);

  // Progress
  const pb=document.createElement('div');pb.className='metric-card';pb.style.padding='20px';
  pb.innerHTML=`<div class="metric-label">Current progress</div><div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-top:4px;"><span>${fmt(current)}</span><span>${fmt(goal)}</span></div>`;
  panel.appendChild(pb);

  const mg=document.createElement('div');mg.className='metrics-grid';
  mg.innerHTML=`
    <div class="metric-card"><div class="metric-label">Total you'll save</div><div class="metric-value">${fmt(totalSaved)}</div></div>
    <div class="metric-card"><div class="metric-label">Interest earned</div><div class="metric-value">${fmt(interestEarned)}</div></div>
    <div class="metric-card"><div class="metric-label">Monthly savings</div><div class="metric-value">${fmt(monthly)}</div></div>
    <div class="metric-card"><div class="metric-label">Target date</div><div class="metric-value" style="font-size:16px">${dateStr}</div></div>`;
  panel.appendChild(mg);

  // Milestones
  if(msData.filter(Boolean).length){
    const mc=document.createElement('div');mc.className='milestone-card';
    mc.innerHTML=`<div class="ms-title">Milestones</div>`+msData.filter(Boolean).map(m=>{
      const my=Math.floor(m.months/12);const mm=m.months%12;
      return `<div class="ms-row"><span>${m.pct}% — ${fmt(goal*m.pct/100)}</span><span>${my>0?my+'y ':''}${mm}mo</span></div>`;
    }).join('');
    panel.appendChild(mc);
  }
  createAffiliateBanner('savings').then(b=>panel.appendChild(b));
}
calculate();
</script>
</body></html>
